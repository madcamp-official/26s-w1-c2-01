name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  # backend/frontend 배포가 같은 EC2의 같은 git 저장소를 공유하므로, 동시에 git 명령을 실행해
  # "cannot lock ref" 충돌이 나지 않도록 두 워크플로우가 같은 그룹을 공유하며 순서대로 실행된다.
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and deploy backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd 26s-w1-c2-01

            echo "Pull latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "Check docker compose"
            docker compose version

            echo "Build and restart api, worker only"
            cd backend
            docker compose up -d --build --no-deps api worker

            echo "Remove unused images"
            docker image prune -f

            echo "Show containers"
            docker compose ps

            echo "Backend deploy completed"
